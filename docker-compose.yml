# ============================================
# Docker Compose - Local Environment
# ============================================
# Usage:
#   Start all:  docker-compose up -d
#   Stop all:   docker-compose down -v
#   Logs:       docker-compose logs -f
#   Status:     docker-compose ps

services:
  # ============================================
  # PostgreSQL Database (always runs)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: fs-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Auth Service (profile: services)
  # ============================================
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: fs-auth-service
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app_db?schema=public
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      JWT_EXPIRES_IN: "15m"
      REFRESH_TOKEN_EXPIRES_IN: "7d"
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: "http://localhost:5173"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://localhost:3001/auth/google/callback
      FRONTEND_URL: http://localhost:5173

    ports:
      - "3001:3001"

    depends_on:
      postgres:
        condition: service_healthy

    develop:
      watch:
        - path: ./services/auth-service/src
          action: rebuild
        - path: ./packages
          action: rebuild

  # ============================================
  # Todo Service (profile: services)
  # ============================================
  todo-service:
    build:
      context: .
      dockerfile: services/todo-service/Dockerfile
    container_name: fs-todo-service
    restart: unless-stopped

    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app_db?schema=public
      JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
      CORS_ORIGIN: "http://localhost:5173"

    ports:
      - "3002:3002"

    depends_on:
      postgres:
        condition: service_healthy

    develop:
      watch:
        - path: ./services/todo-service/src
          action: rebuild
        - path: ./packages
          action: rebuild

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
